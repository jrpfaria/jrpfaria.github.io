<div class="terminal-frame system-frame">
  <div class="terminal-bar">
    <span class="dot dot-primary"></span>
    <span class="dot dot-secondary"></span>
    <span class="dot dot-tertiary"></span>
    <span class="terminal-title">fastfetch</span>
  </div>
  <div class="terminal-body">
    <div class="system-info">
      <div class="sys-row"><span class="sys-key">OS</span>      <span class="sys-val">CachyOS x86_64</span></div>
      <div class="sys-row"><span class="sys-key">WM</span>      <span class="sys-val">Hyprland</span></div>
      <div class="sys-row"><span class="sys-key">Shell</span>   <span class="sys-val">fish</span></div>
      <div class="sys-row"><span class="sys-key">Term</span>    <span class="sys-val">ghostty</span></div>
      <div class="sys-row"><span class="sys-key">Editor</span> <span class="sys-val">Neovim</span></div>
      <div class="sys-row sys-dotfiles">
        <span class="sys-key">Dotfiles</span>
        <a href="https://github.com/{{ site.github_username }}/arch-config" target="_blank" rel="noopener" class="sys-val">jrpfaria/arch-config</a>
      </div>
    </div>
  </div>
</div>
